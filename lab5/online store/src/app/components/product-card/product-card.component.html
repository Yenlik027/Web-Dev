<div class="card">

  <div class="img-wrapper">
    <img [src]="product.image" [alt]="product.name">
  </div>

  <h3>{{ product.name }}</h3>

  <p class="description">{{ product.description }}</p>

  <p class="price">{{ product.price | number:'1.0-0'}} KZT</p>

  <p>❤ {{ product.likes }}</p>
  <button (click)="like()" class="like-button">Like</button>

  <button (click)="onDelete()" class="del-button">Delete</button>

  <a [href]="product.link" target="_blank" class="kaspi-btn">
    Посмотреть на Kaspi
  </a>

  <div class="share-buttons">
    <button (click)="shareWhatsApp()">WhatsApp</button>
    <button (click)="shareTelegram()">Telegram</button>
  </div>

</div>
